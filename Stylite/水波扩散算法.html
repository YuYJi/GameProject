<!DOCTYPE html>
<html lang="zh">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>水波扩散算法演示</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0a0e1a;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Segoe UI', system-ui, sans-serif;
        }

        .container {
            background: #141a2b;
            border-radius: 24px;
            padding: 24px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.8);
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        canvas {
            display: block;
            border-radius: 16px;
            box-shadow: inset 0 0 30px rgba(0, 20, 80, 0.6);
            width: 600px;
            height: 600px;
            background: #0b1322;
            cursor: crosshair;
        }

        .info {
            margin-top: 16px;
            color: #8aa4d8;
            font-size: 14px;
            letter-spacing: 1px;
            display: flex;
            gap: 32px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .info span {
            background: #1f2940;
            padding: 6px 18px;
            border-radius: 30px;
            border: 1px solid #2f3d60;
        }

        .info .highlight {
            color: #7ec8f0;
            font-weight: 600;
        }

        .controls {
            margin-top: 12px;
            display: flex;
            gap: 20px;
            align-items: center;
        }

        .controls label {
            color: #8aa4d8;
            font-size: 13px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .controls input[type="range"] {
            width: 120px;
            accent-color: #4d9fff;
            background: #1f2940;
            height: 4px;
            border-radius: 4px;
        }

        .controls button {
            background: #2a3b60;
            border: none;
            color: #d0e4ff;
            padding: 6px 18px;
            border-radius: 30px;
            font-size: 13px;
            cursor: pointer;
            transition: 0.2s;
            border: 1px solid #3f5a88;
        }

        .controls button:hover {
            background: #3a5180;
            transform: scale(1.02);
        }

        @media (max-width: 640px) {
            canvas {
                width: 90vw;
                height: 90vw;
            }
        }
    </style>
</head>

<body>
    <div class="container">
        <canvas id="waveCanvas" width="400" height="400"></canvas>
        <div class="info">
            <span>💧 点击 / 拖动 激波</span>
            <span>阻尼 <span id="dampingDisplay" class="highlight">0.990</span></span>
            <span>帧率 <span id="fpsDisplay" class="highlight">60</span> FPS</span>
        </div>
        <div class="controls">
            <label>
                阻尼
                <input type="range" id="dampingSlider" min="0.980" max="0.999" step="0.001" value="0.990">
            </label>
            <button id="clearBtn">清空水面</button>
        </div>
    </div>
    <script>
        (function () {
            // ---------- 配置 ----------
            const canvas = document.getElementById('waveCanvas');
            const ctx = canvas.getContext('2d');
            const W = canvas.width;   // 400
            const H = canvas.height;  // 400

            // 网格分辨率（每个像素一个采样点，兼顾性能与视觉效果）
            const GRID_W = 200;
            const GRID_H = 200;

            // 两个缓冲区（当前帧和前一帧）
            let current = new Float32Array(GRID_W * GRID_H);
            let previous = new Float32Array(GRID_W * GRID_H);

            // ---------- 辅助函数 ----------
            function idx(x, y) {
                return y * GRID_W + x;

            function resetWave() {
                current.fill(0);
                previous.fill(0);
            }

            // 在 (gx, gy) 处施加一个冲击（正值突起）
            function poke(gx, gy, strength = 120) {
                // 确保在边界内
                if (gx < 1 || gx >= GRID_W - 1 || gy < 1 || gy >= GRID_H - 1) return;
                // 给当前帧一个凸起，同时上一帧也稍低，产生初始速度
                const pos = idx(gx, gy);
                current[pos] = strength;
                // 让上一帧略低，产生向下的速度？经典算法中，设置current为正值，previous为0即可。
                // 但为了更明显的扩散，可以同时修改邻域
                // 我们只修改中心点，让波自然扩散

                    for (let dx = -1; dx <= 1; dx++) {
                        if (dx === 0 && dy === 0) continue;
                        const nx = gx + dx;
                        const ny = gy + dy;
                        if (nx >= 0 && nx < GRID_W && ny >= 0 && ny < GRID_H) {
                            const p = idx(nx, ny);
                            current[p] = strength * 0.25; // 周围略低
                        }
                    }
                }
                // 上一帧保持0，产生速度差
            }

            function gridToPixel(gx, gy) {
                const px = (gx / GRID_W) * W;
                const py = (gy / GRID_H) * H;
                return { px, py };
            }

            // ---------- 核心更新：水波扩散算法 ----------
            function updateWave() {
                const w = GRID_W;
                const h = GRID_H;
                const cur = current;
                const prev = previous;
                const damp = damping;

                // 对于内部点（边界固定为0，不更新）
                for (let y = 1; y < h - 1; y++) {
                    for (let x = 1; x < w - 1; x++) {
                        const i = idx(x, y);
                        // 经典公式：new = ( (left+right+up+down) * 0.5 - previous ) * damping
                        // 但为了更稳定，常用：new = ( (left+right+up+down) * 0.5 - prev ) * damping
                        // 这里使用current作为“上一帧”，previous作为“更早一帧”
                        // 实际上，我们交换角色，所以更新时用cur作为上一帧，prev作为更早一帧
                        const left = cur[idx(x - 1, y)];
                        const right = cur[idx(x + 1, y)];
                        const up = cur[idx(x, y - 1)];
                        const down = cur[idx(x, y + 1)];
                        // 计算新值
                        const newVal = ((left + right + up + down) * 0.5 - prev[i]) * damp;
                        // 直接写入当前帧？但我们需要保留旧值用于下一次计算？所以我们先存储到临时数组，但为了节省内存，我们可以用交换法。
                        // 这里我们使用一个临时数组，或者在原数组上原地更新？原地更新会导致扩散错误，因为需要旧值。
                        // 所以我们使用双缓冲：当前帧是旧值，下一帧写入另一个数组。
                        // 我们采用两个数组，每次更新后交换。
                        // 但当前我们使用cur作为旧值，prev作为更早，新值应写入另一个数组，但我们没有第三个数组。
                        // 常见做法：使用两个数组，每次更新时用当前和上一个，结果写入另一个。
                        // 这里我们采用两个数组，但更新时，我们用current作为当前值，previous作为上一帧，结果写入temp数组。
                        // 但这样每次需要复制。更高效的方式：使用三个数组，或使用两个数组交替角色。
                        // 经典教程：使用两个数组，新值直接写入previous？但会覆盖。
                        // 我们采用两个数组，但更新时，用cur作为“上一帧”，prev作为“更早一帧”，结果写入一个临时数组，然后交换cur和temp？太复杂。
                        // 简单实现：使用两个数组，每次更新时，用current作为当前值，previous作为前一帧，新值写入另一个数组（比如临时数组），然后交换current和temp。
                        // 我们直接使用三个数组？还是使用两个并复制？
                        // 更简单的方式：用两个数组，但更新时，新值写入previous（因为previous不再需要？），但previous是更早一帧，我们需要它计算下一次，所以不能覆盖。
                        // 所以必须有一个临时数组。
                        // 为了简化，我们使用三个数组：cur, prev, next。
                        // 但代码容易复杂化。
                        // 经典方法：使用两个数组，但更新时，直接修改一个，用另一个作旧值，交替角色。
                        // 我们定义current为“当前帧”，previous为“前一帧”，每次计算新帧，然后交换指针。

                        // 其实我们可以用两个数组，但用不同的变量名表示“当前”和“上一帧”，并有一个临时数组。

                    }

                // 但是上面循环内未实际实现，因为需要处理数组交换。

                // 我们采用三个数组：cur, prev, next。
                // 但为了节省内存，我们只使用两个，但通过交换指针，每次更新后交换cur和prev，并复用。
                // 算法：新值 = ( (cur上+cur下+cur左+cur右) * 0.5 - prev ) * damping
                // 我们需要一个临时数组存储新值，然后交换：prev = cur; cur = new
                // 所以需要三个数组：cur, prev, new

                // 但在函数内，我们使用闭包变量，我们之前定义了两个，现在改为三个。
                // 但为了保持向下兼容，我们重新定义。
                // 我们使用三个全局数组。
            }

            // 我们重新组织：使用三个数组 cur, prev, next
            // 重新初始化
            let cur = new Float32Array(GRID_W * GRID_H);
            let prev = new Float32Array(GRID_W * GRID_H);
            let next = new Float32Array(GRID_W * GRID_H);

            function resetWaveArrays() {
                cur.fill(0);
                prev.fill(0);
                next.fill(0);
            }

            function pokeArray(gx, gy, strength = 120) {
                if (gx < 1 || gx >= GRID_W - 1 || gy < 1 || gy >= GRID_H - 1) return;
                const pos = gx + gy * GRID_W;
                cur[pos] = strength;
                // 周围加一点
                for (let dy = -1; dy <= 1; dy++) {
                    for (let dx = -1; dx <= 1; dx++) {
                        if (dx === 0 && dy === 0) continue;
                        const nx = gx + dx;
                        const ny = gy + dy;
                        if (nx >= 0 && nx < GRID_W && ny >= 0 && ny < GRID_H) {
                            const p = nx + ny * GRID_W;
                            cur[p] = strength * 0.3;
                        }
                    }
                }
            }

            function updateWaveArrays() {
                const w = GRID_W;
                const h = GRID_H;
                const c = cur;
                const p = prev;
                const n = next;
                const damp = damping;

                for (let y = 1; y < h - 1; y++) {
                    for (let x = 1; x < w - 1; x++) {
                        const i = x + y * w;
                        const left = c[(x - 1) + y * w];
                        const right = c[(x + 1) + y * w];
                        const up = c[x + (y - 1) * w];
                        const down = c[x + (y + 1) * w];
                        // 新值
                        const val = ((left + right + up + down) * 0.5 - p[i]) * damp;
                        n[i] = val;
                    }
                }
                // 边界保持0（不更新，默认0）
                // 交换：prev = cur; cur = next; next = old prev?
                // 为了下一次，我们需要把prev设为旧cur，cur设为新n，next可以重用旧prev或旧cur
                // 交换指针：将cur赋给prev，next赋给cur，然后清除next（或重用）
                // 我们可以用临时变量交换引用。
                const tempArr = prev;
                // 但是我们需要把cur赋给prev，next赋给cur，然后tempArr（旧prev）变成next
                // 但我们需要把next清空或覆盖。
                // 标准做法：
                // let temp = prev;
                // prev = cur;
                // cur = next;
                // next = temp;
                // 这样next就指向了旧的prev，下次更新时会被覆盖。
                // 我们直接赋值引用。
                // 但JavaScript中，我们需要用外部变量，所以这里用闭包。
                // 使用一个临时变量交换。
                // 但我们在函数内部操作外部变量，需要声明。
                // 在这里使用全局的cur, prev, next。
                // 我们使用一个临时变量
                const tmp = prev;
                // 但注意，prev是参数？我们使用外部变量，不能用var声明。
                // 这里我们直接操作外部变量，但JavaScript中，在函数内可以读写外部变量。
                // 我们直接交换。
                // 但是，我们需要将cur的值赋给prev，next赋给cur，tmp（旧prev）赋给next
                // 但我们需要在外部作用域中改变这些变量。
                // 因为cur, prev, next是全局（外部）变量，我们可以重新赋值。
                // 使用 let 声明的变量在外部，函数内可以重新赋值。
                // 这里我们直接使用赋值。
                // 但注意，在函数内部，如果重新赋值，会遮蔽外部变量？我们需要用window.cur等方式。
                // 简便方法：返回新数组，由外部赋值。
                // 但为了清晰，我们直接在函数内修改外部变量。
                // 因为cur, prev, next是在外层作用域（闭包）中定义的，所以在函数内可以直接赋值。
                // 但是，如果使用 var/let 在外部，内部可以重新赋值。
                // 我们这样写：

                // 在函数末尾：
                // [prev, cur, next] = [cur, next, prev]; 但是这样会创建新数组，开销小但可读。

                // 我们可以把cur, prev, next定义在函数外，在update函数内直接操作。
                // 但为了安全性，我们采用显式传递引用？
                // 简单实现：在更新后，重新赋值外部变量。

                // 下面的代码已经定义在IIFE内，所以我们直接使用这些变量。

    <script>
        // 完全重新实现
        (function () {
            const canvas = document.getElementById('waveCanvas');
            const ctx = canvas.getContext('2d');
            const W = canvas.width, H = canvas.height;
            const GRID_W = 200, GRID_H = 200;

            let cur = new Float32Array(GRID_W * GRID_H);
            let prev = new Float32Array(GRID_W * GRID_H);
            let next = new Float32Array(GRID_W * GRID_H);
            let damping = 0.990;
            let mouseDown = false;

            const dampingSlider = document.getElementById('dampingSlider');
            const dampingDisplay = document.getElementById('dampingDisplay');
            const fpsDisplay = document.getElementById('fpsDisplay');
            const clearBtn = document.getElementById('clearBtn');

            function resetAll() {
                cur.fill(0); prev.fill(0); next.fill(0);
            }

            function pokeAt(gx, gy, strength = 200) {
                if (gx < 1 || gx >= GRID_W - 1 || gy < 1 || gy >= GRID_H - 1) return;
                const idx = gx + gy * GRID_W;
                cur[idx] = strength;
                for (let dy = -1; dy <= 1; dy++) {
                    for (let dx = -1; dx <= 1; dx++) {
                        if (dx === 0 && dy === 0) continue;
                        const nx = gx + dx, ny = gy + dy;
                        if (nx >= 0 && nx < GRID_W && ny >= 0 && ny < GRID_H) {
                            cur[nx + ny * GRID_W] = strength * 0.3;
                        }
                    }
                }
            }

            function updateWave() {
                const w = GRID_W, h = GRID_H;
                const c = cur, p = prev, n = next;
                const damp = damping;

                // 1. 核心更新（内部点）
                for (let y = 1; y < h - 1; y++) {
                    for (let x = 1; x < w - 1; x++) {
                        const i = x + y * w;
                        const val = ((c[(x - 1) + y * w] + c[(x + 1) + y * w] + c[x + (y - 1) * w] + c[x + (y + 1) * w]) * 0.5 - p[i]) * damp;
                        n[i] = val;
                    }
                }

                // 2. 交换缓冲区（此时 cur 指向新帧，prev 指向旧帧）
                const tmp = prev;
                prev = cur;
                cur = next;
                next = tmp;

                // 3. 海绵层吸收：在靠近边界处施加额外衰减
                const spongeWidth = 8;          // 吸收层厚度（网格数）
                const cNew = cur;               // 当前帧（新值）
                for (let y = 0; y < h; y++) {
                    for (let x = 0; x < w; x++) {
                        // 计算到最近边界的距离
                        const dist = Math.min(x, w - 1 - x, y, h - 1 - y);
                        if (dist < spongeWidth) {
                            // 线性衰减因子：边界处为 0.3，内部（dist=spongeWidth）为 1.0
                            const factor = 0.3 + 0.7 * (dist / spongeWidth);
                            cNew[x + y * w] *= factor;
                        }
                    }
                }
            }

            function render() {
                const imageData = ctx.createImageData(W, H);
                const data = imageData.data;
                const c = cur;
                let maxVal = 0;
                for (let i = 0; i < c.length; i++) {
                    const abs = Math.abs(c[i]);
                    if (abs > maxVal) maxVal = abs;
                }
                if (maxVal < 0.001) maxVal = 1;
                const scale = 1.0 / maxVal;
                for (let py = 0; py < H; py++) {
                    for (let px = 0; px < W; px++) {
                        const gx = Math.floor((px / W) * GRID_W);
                        const gy = Math.floor((py / H) * GRID_H);
                        const val = c[gx + gy * GRID_W] * scale;
                        const r = 20 + 40 * (val + 1) * 0.5;
                        const g = 30 + 80 * (val + 1) * 0.5;
                        const b = 120 + 135 * (val + 1) * 0.5;
                        const idx = (py * W + px) * 4;
                        data[idx] = Math.min(255, Math.max(0, r));
                        data[idx + 1] = Math.min(255, Math.max(0, g));
                        data[idx + 2] = Math.min(255, Math.max(0, b));
                        data[idx + 3] = 255;
                    }
                }
                ctx.putImageData(imageData, 0, 0);
            }

            // ---------- 交互：使用 pointer 事件 ----------
            function handlePoke(clientX, clientY) {
                const rect = canvas.getBoundingClientRect();
                const scaleX = canvas.width / rect.width;
                const scaleY = canvas.height / rect.height;
                const canvasX = (clientX - rect.left) * scaleX;
                const canvasY = (clientY - rect.top) * scaleY;
                if (canvasX < 0 || canvasX >= W || canvasY < 0 || canvasY >= H) return;
                const gx = Math.floor((canvasX / W) * GRID_W);
                const gy = Math.floor((canvasY / H) * GRID_H);
                if (gx < 1 || gx >= GRID_W - 1 || gy < 1 || gy >= GRID_H - 1) return;
                pokeAt(gx, gy, 250);  // 强度提高
            }

            canvas.addEventListener('pointerdown', (e) => {
                e.preventDefault();
                mouseDown = true;
                handlePoke(e.clientX, e.clientY);
            });
            canvas.addEventListener('pointermove', (e) => {
                if (mouseDown) handlePoke(e.clientX, e.clientY);
            });
            canvas.addEventListener('pointerup', () => { mouseDown = false; });
            canvas.addEventListener('pointerleave', () => { mouseDown = false; });

            // 控件
            dampingSlider.addEventListener('input', () => {
                damping = parseFloat(dampingSlider.value);
                dampingDisplay.textContent = damping.toFixed(3);
            });
            clearBtn.addEventListener('click', resetAll);

            // 初始波纹
            resetAll();
            pokeAt(Math.floor(GRID_W / 2), Math.floor(GRID_H / 2), 200);

            let frameCount = 0, lastFpsUpdate = performance.now();
            function loop(timestamp) {
                updateWave();
                render();
                frameCount++;
                if (timestamp - lastFpsUpdate >= 1000) {
                    fpsDisplay.textContent = frameCount;
                    frameCount = 0;
                    lastFpsUpdate = timestamp;
                }
                requestAnimationFrame(loop);
            }
            requestAnimationFrame(loop);
        })();
    </script>
